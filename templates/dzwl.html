<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子围栏客流分析 - 新朝旅游</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/module.css') }}">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="/" class="back-btn">← 返回首页</a>
            <h1>🔒 电子围栏客流分析</h1>
        </header>

        <div class="content-wrapper">
            <div class="form-panel">
                <h2>查询参数设置</h2>
                
                <div class="info-box">
                    <h4>📌 数据说明</h4>
                    <p>电子围栏系统记录景区进出人数的实时数据</p>
                </div>
                
                <h3>快速日期选择</h3>
                <div class="quick-dates">
                    <button type="button" class="btn-quick" data-start="2025-05-01" data-end="2025-05-05">五一假期</button>
                    <button type="button" class="btn-quick" data-start="2025-10-01" data-end="2025-10-07">十一假期</button>
                    <button type="button" class="btn-quick" data-start="2025-07-01" data-end="2025-08-31">暑假</button>
                </div>
                
                <h3>自定义日期范围</h3>
                <form id="query-form">
                    <div class="form-group">
                        <label for="start-date">开始日期:</label>
                        <input type="date" id="start-date" name="start_date" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="end-date">结束日期:</label>
                        <input type="date" id="end-date" name="end_date" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-dzwl">
                        🔍 查询数据
                    </button>
                </form>
            </div>
            
            <div class="results-panel">
                <div class="results-header">
                    <h2>查询结果</h2>
                    <button id="chart-btn" class="btn btn-secondary btn-dzwl" style="display: none;">
                        📊 生成图表
                    </button>
                </div>
                
                <div id="stats-container" class="stats-container"></div>
                
                <div id="results-container" class="results-container">
                    <div class="empty-state">
                        <p>📋 暂无数据<br><br>请设置查询参数后点击【查询数据】按钮</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="chart-container" class="chart-container" style="display: none;">
            <h3>客流趋势图</h3>
            <img id="chart-img" src="" alt="图表">
        </div>

        <div class="help-section">
            <h4>💡 操作说明</h4>
            <ol>
                <li>可以点击快速日期按钮快速选择常用时间段</li>
                <li>或手动选择自定义日期范围</li>
                <li>点击"查询数据"查看每日进出人数统计</li>
                <li>点击"生成图表"查看客流趋势可视化</li>
            </ol>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
        <p>数据分析中...</p>
    </div>

    <script src="{{ url_for('static', filename='js/dzwl.js') }}"></script>
</body>
</html>
